<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Luyện đề Reading ETS</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Be Vietnam Pro', 'Segoe UI', sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    /* ===== HERO ===== */
    .hero {
      background: linear-gradient(135deg, #00c48c 0%, #00a876 50%, #0091a8 100%);
      padding: 52px 24px 68px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 50%, rgba(255,255,255,0.08) 0%, transparent 55%),
        radial-gradient(circle at 85% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
    }

    .hero-inner { position: relative; z-index: 1; max-width: 620px; margin: 0 auto; }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.18);
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-badge .dot {
      width: 7px; height: 7px;
      background: #d4f7e8;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%,100%{opacity:1;transform:scale(1)}
      50%{opacity:.5;transform:scale(1.4)}
    }

    .hero h1 {
      font-size: clamp(1.9rem, 5vw, 3rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    .hero h1 .hl {
      background: linear-gradient(90deg, #fde68a, #fbbf24);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p { font-size: 15px; color: rgba(255,255,255,0.78); line-height: 1.7; }

    .hero-stats { display: flex; justify-content: center; gap: 40px; margin-top: 28px; }
    .hero-stat .num { font-size: 1.8rem; font-weight: 800; color: #fff; line-height: 1; }
    .hero-stat .lbl { font-size: 11px; font-weight: 600; color: rgba(255,255,255,.6); margin-top: 4px; text-transform: uppercase; letter-spacing: .8px; }

    /* ===== MAIN ===== */
    .main { max-width: 1100px; margin: -28px auto 60px; padding: 0 20px; }

    /* ===== PROGRESS ===== */
    .prog-card {
      background: #fff;
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .prog-icon {
      width: 48px; height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #00c48c, #00a876);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; flex-shrink: 0;
      box-shadow: 0 3px 10px rgba(0,196,140,.3);
    }

    .prog-info { flex: 1; min-width: 0; }

    .prog-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .prog-title { font-size: 13px; font-weight: 700; color: #1a1a2e; }
    .prog-num   { font-size: 13px; font-weight: 800; color: #00a876; }

    .prog-bar {
      width: 100%; height: 8px;
      background: #eef0f4;
      border-radius: 99px;
      overflow: hidden;
    }

    .prog-fill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #00c48c, #00d49a);
      transition: width .5s ease;
      width: 0%;
    }

    .prog-sub { font-size: 11px; color: #9a9ab0; margin-top: 6px; font-weight: 500; }

    /* ===== CHIP BAR ===== */
    .chip-bar {
      background: #fff;
      border-radius: 16px;
      padding: 12px 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,.07);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .chip-lbl { font-size: 11px; font-weight: 700; color: #9a9ab0; text-transform: uppercase; letter-spacing: .5px; margin-right: 4px; }

    .chip {
      padding: 7px 16px;
      border-radius: 99px;
      border: 1.5px solid #eef0f4;
      background: #f0f2f5;
      font-size: 12px;
      font-weight: 700;
      color: #9a9ab0;
      cursor: pointer;
      transition: all .18s;
      font-family: inherit;
    }

    .chip:hover { border-color: #00c48c; color: #00a876; background: #e6faf4; }

    .chip.on {
      background: linear-gradient(135deg, #00c48c, #00a876);
      color: #fff;
      border-color: #00c48c;
      box-shadow: 0 3px 10px rgba(0,196,140,.3);
    }

    /* ===== TILE GRID ===== */
    .tile-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; }

    .tile {
      background: #fff;
      border-radius: 16px;
      border: 2px solid #eef0f4;
      padding: 20px 18px 18px;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }

    .tile::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
    }

    .tile[data-year="2020"]::before { background: linear-gradient(90deg,#00c48c,#00d49a); }
    .tile[data-year="2021"]::before { background: linear-gradient(90deg,#3b6cf8,#6b9cf8); }
    .tile[data-year="2022"]::before { background: linear-gradient(90deg,#f5a623,#fbbf24); }
    .tile[data-year="2023"]::before { background: linear-gradient(90deg,#ff5c5c,#ff8080); }
    .tile[data-year="2024"]::before { background: linear-gradient(90deg,#7c6cf8,#a09cf8); }

    .tile:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,.1); }

    .tile[data-year="2020"]:hover { border-color: #00c48c; }
    .tile[data-year="2021"]:hover { border-color: #3b6cf8; }
    .tile[data-year="2022"]:hover { border-color: #f5a623; }
    .tile[data-year="2023"]:hover { border-color: #ff5c5c; }
    .tile[data-year="2024"]:hover { border-color: #7c6cf8; }

    .tile.hidden { display: none; }

    .tile-year { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; }
    .tile[data-year="2020"] .tile-year { color: #00a876; }
    .tile[data-year="2021"] .tile-year { color: #2554e8; }
    .tile[data-year="2022"] .tile-year { color: #e08a00; }
    .tile[data-year="2023"] .tile-year { color: #e03a3a; }
    .tile[data-year="2024"] .tile-year { color: #5b4de8; }

    .tile-name { font-size: 14px; font-weight: 800; color: #1a1a2e; line-height: 1.3; }

    .tile-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      width: fit-content;
      user-select: none;
      border: none;
      font-family: inherit;
      transition: all .18s;
    }

    .tile-badge:hover { opacity: .8; transform: scale(1.05); }
    .tile-badge.chua   { background: #f0f2f5; color: #9a9ab0; }
    .tile-badge.done   { background: #e6faf4; color: #00a876; }
    .tile-badge.review { background: #fff8e6; color: #e08a00; }

    /* ===== FOOTER ===== */
    .footer { text-align: center; padding: 28px 24px; font-size: 12px; color: #9a9ab0; font-weight: 500; }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 680px) {
      .hero { padding: 40px 20px 80px; }
      .hero-stats { gap: 24px; }
      .prog-card { flex-direction: column; align-items: flex-start; gap: 12px; }
      .tile-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    }

    @media (max-width: 380px) {
      .tile-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-badge"><span class="dot"></span>TOEIC Reading Practice</div>
    <h1>Luyện đề <span class="hl">Reading ETS</span></h1>
    <p>Kho đề thi thực từ ETS 2020 – 2024.<br>Luyện tập mỗi ngày, tự tin chinh phục TOEIC!</p>
    <div class="hero-stats">
      <div class="hero-stat"><div class="num">45</div><div class="lbl">Đề thi</div></div>
      <div class="hero-stat"><div class="num">5</div><div class="lbl">Năm ETS</div></div>
      <div class="hero-stat"><div class="num">100%</div><div class="lbl">Miễn phí</div></div>
    </div>
  </div>
</div>

<div class="main">

  <!-- Progress -->
  <div class="prog-card">
    <div class="prog-icon">📊</div>
    <div class="prog-info">
      <div class="prog-top">
        <span class="prog-title">Tiến độ luyện tập</span>
        <span class="prog-num" id="progNum">0 / 45 đề</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" id="progFill"></div></div>
      <div class="prog-sub" id="progSub">Bắt đầu làm bài để theo dõi tiến độ của bạn</div>
    </div>
  </div>

  <!-- Chips -->
  <div class="chip-bar">
    <span class="chip-lbl">Lọc:</span>
    <button class="chip on" data-y="all"  onclick="setYear('all')" >Tất cả</button>
    <button class="chip"    data-y="2020" onclick="setYear('2020')">ETS 2020</button>
    <button class="chip"    data-y="2021" onclick="setYear('2021')">ETS 2021</button>
    <button class="chip"    data-y="2022" onclick="setYear('2022')">ETS 2022</button>
    <button class="chip"    data-y="2023" onclick="setYear('2023')">ETS 2023</button>
    <button class="chip"    data-y="2024" onclick="setYear('2024')">ETS 2024</button>
  </div>

  <!-- Tiles -->
  <div class="tile-grid" id="grid"></div>

</div>

<div class="footer">Tài liệu luyện thi TOEIC Reading · ETS 2020 – 2024</div>

<script>
var EXAMS = [
  {year:"2020",name:"Đề 1", href:"2020/de1.html"},
  {year:"2020",name:"Đề 2", href:"2020/de2.html"},
  {year:"2020",name:"Đề 3", href:"2020/de3.html"},
  {year:"2020",name:"Đề 4", href:"2020/de4.html"},
  {year:"2020",name:"Đề 5", href:"2020/de5.html"},
  {year:"2020",name:"Đề 6", href:"2020/de6.html"},
  {year:"2020",name:"Đề 7", href:"2020/de7.html"},
  {year:"2020",name:"Đề 8", href:"2020/de8.html"},
  {year:"2020",name:"Đề 9", href:"2020/de9.html"},
  {year:"2020",name:"Đề 10",href:"2020/de10.html"},
  {year:"2021",name:"Đề 1", href:"2021/de1.html"},
  {year:"2021",name:"Đề 2", href:"2021/de2.html"},
  {year:"2021",name:"Đề 3", href:"2021/de3.html"},
  {year:"2021",name:"Đề 4", href:"2021/de4.html"},
  {year:"2021",name:"Đề 5", href:"2021/de5.html"},
  {year:"2022",name:"Đề 1", href:"2022/de1.html"},
  {year:"2022",name:"Đề 2", href:"2022/de2.html"},
  {year:"2022",name:"Đề 3", href:"2022/de3.html"},
  {year:"2022",name:"Đề 4", href:"2022/de4.html"},
  {year:"2022",name:"Đề 5", href:"2022/de5.html"},
  {year:"2022",name:"Đề 6", href:"2022/de6.html"},
  {year:"2022",name:"Đề 7", href:"2022/de7.html"},
  {year:"2022",name:"Đề 8", href:"2022/de8.html"},
  {year:"2022",name:"Đề 9", href:"2022/de9.html"},
  {year:"2022",name:"Đề 10",href:"2022/de10.html"},
  {year:"2023",name:"Đề 1", href:"2023/de1.html"},
  {year:"2023",name:"Đề 2", href:"2023/de2.html"},
  {year:"2023",name:"Đề 3", href:"2023/de3.html"},
  {year:"2023",name:"Đề 4", href:"2023/de4.html"},
  {year:"2023",name:"Đề 5", href:"2023/de5.html"},
  {year:"2023",name:"Đề 6", href:"2023/de6.html"},
  {year:"2023",name:"Đề 7", href:"2023/de7.html"},
  {year:"2023",name:"Đề 8", href:"2023/de8.html"},
  {year:"2023",name:"Đề 9", href:"2023/de9.html"},
  {year:"2023",name:"Đề 10",href:"2023/de10.html"},
  {year:"2024",name:"Đề 1", href:"2024/de1.html"},
  {year:"2024",name:"Đề 2", href:"2024/de2.html"},
  {year:"2024",name:"Đề 3", href:"2024/de3.html"},
  {year:"2024",name:"Đề 4", href:"2024/de4.html"},
  {year:"2024",name:"Đề 5", href:"2024/de5.html"},
  {year:"2024",name:"Đề 6", href:"2024/de6.html"},
  {year:"2024",name:"Đề 7", href:"2024/de7.html"},
  {year:"2024",name:"Đề 8", href:"2024/de8.html"},
  {year:"2024",name:"Đề 9", href:"2024/de9.html"},
  {year:"2024",name:"Đề 10",href:"2024/de10.html"},
];

var TOTAL = EXAMS.length;
var CYCLE = ["chua","done","review"];
var ICON  = {chua:"⚪",done:"✅",review:"🔁"};
var LABEL = {chua:"Chưa làm",done:"Đã làm",review:"Xem lại"};
var curYear = "all";

function key(e){ return "ts_"+e.year+"_"+e.name.replace(/\s/g,"_"); }
function getSt(e){ return localStorage.getItem(key(e))||"chua"; }
function setSt(e,s){ localStorage.setItem(key(e),s); }

function updateProgress(){
  var done = EXAMS.filter(function(e){return getSt(e)==="done";}).length;
  var pct  = Math.round(done/TOTAL*100);
  document.getElementById("progNum").textContent  = done+" / "+TOTAL+" đề";
  document.getElementById("progFill").style.width = pct+"%";
  var sub = document.getElementById("progSub");
  if(done===0)      sub.textContent="Bắt đầu làm bài để theo dõi tiến độ của bạn";
  else if(done===TOTAL) sub.textContent="🎉 Tuyệt vời! Bạn đã hoàn thành tất cả đề!";
  else              sub.textContent="Còn "+(TOTAL-done)+" đề chưa làm — cố lên!";
}

function renderTiles(){
  var grid = document.getElementById("grid");
  grid.innerHTML = "";
  var list = curYear==="all" ? EXAMS : EXAMS.filter(function(e){return e.year===curYear;});

  list.forEach(function(exam){
    var st = getSt(exam);

    var tile = document.createElement("a");
    tile.className = "tile";
    tile.href = exam.href;
    tile.dataset.year = exam.year;

    var yr = document.createElement("div");
    yr.className = "tile-year";
    yr.textContent = "ETS "+exam.year;

    var nm = document.createElement("div");
    nm.className = "tile-name";
    nm.textContent = exam.name;

    var badge = document.createElement("button");
    badge.className = "tile-badge "+st;
    badge.textContent = ICON[st]+" "+LABEL[st];

    badge.addEventListener("click",function(e){
      e.preventDefault();
      e.stopPropagation();
      var cur  = getSt(exam);
      var next = CYCLE[(CYCLE.indexOf(cur)+1)%CYCLE.length];
      setSt(exam,next);
      badge.className = "tile-badge "+next;
      badge.textContent = ICON[next]+" "+LABEL[next];
      updateProgress();
    });

    tile.appendChild(yr);
    tile.appendChild(nm);
    tile.appendChild(badge);
    grid.appendChild(tile);
  });
}

window.setYear = function(y){
  curYear = y;
  document.querySelectorAll(".chip").forEach(function(c){
    c.classList.toggle("on", c.dataset.y===y);
  });
  renderTiles();
};

renderTiles();
updateProgress();
</script>
</body>
</html>
